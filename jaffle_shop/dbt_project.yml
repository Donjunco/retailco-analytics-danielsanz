#nombre del proyecto
name: jaffle_shop

#perfil de conexion
profile: jaffle_shop

seed-paths: ["seeds"]
model-paths: ["models"]
macro-paths: ["macros"]
clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  # Builds seeds into '<your_schema_name>_raw'
  jaffle_shop:
    +schema: raw

#para valores clv clientes
vars:
  clv_p33: 425.83
  clv_p66: 1854.956


#materializaciones
models:
  jaffle_shop:
    +static_analysis: strict
    # Materialize staging models as views, and marts as tables
    staging:
      +schema: STAGING
      +materialized: view
      #subcarpetas
      tpcds:
        +schema: STAGING
        +materialized: view

    intermediate:
      +schema: INTERMEDIATE
      +materialized: view
      #subcarpetas
      tpcds:
        +schema: INTERMEDIATE
        +materialized: view
        
    marts:
      +schema: MARTS
      +materialized: table
      tpcds:
        +schema: MARTS
        +materialized: view
