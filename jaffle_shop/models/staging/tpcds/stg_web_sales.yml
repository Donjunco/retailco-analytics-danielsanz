models:
  - name: stg_web_sales
    columns:
      - name: sold_date_sk
        tests:
         - not_null

      - name: ship_date_sk
        tests:
         - not_null

      - name: item_sk
        tests:
         - not_null

      - name: promotion_sk
        tests:
         - not_null

      - name: order_number
        tests:
         - not_null          

    tests:
      #combinación única de order_number e item_sk
      - dbt_utils.unique_combination_of_columns:
         arguments:
          combination_of_columns:
            - order_number
            - item_sk                                                                                                           