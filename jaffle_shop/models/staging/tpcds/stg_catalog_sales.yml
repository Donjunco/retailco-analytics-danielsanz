models:
  - name: stg_catalog_sales
    description: Customer data with basic cleaning and transformation applied, one row per customer.
    columns:
      - name: order_number
        tests:
         - not_null

      - name: sold_date_sk
        tests:
         - not_null

      - name: item_sk
        tests:
         - not_null


    #para evitar que se repitan los registros, se puede usar una combinación de columnas que identifiquen de manera única cada registro, como el número de orden y el item_sk
    tests:
      - dbt_utils.unique_combination_of_columns:
         arguments:
          combination_of_columns:
            - order_number
            - item_sk