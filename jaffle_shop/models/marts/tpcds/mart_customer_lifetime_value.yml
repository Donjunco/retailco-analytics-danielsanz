version: 2

models:
  - name: mart_customer_lifetime_value
    description: "Métrica de valor de vida del cliente (CLV) calculada como la suma de las ventas netas después de devoluciones por cliente."
    columns:

      - name: customer_sk
        tests:
          - not_null

      - name: clv
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 999999
                strictly: false

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - customer_sk
